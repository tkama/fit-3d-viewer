<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>FIT Data 3D Viewer</title>
  <link rel="stylesheet" href="styles.css">
  
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/deck.gl@9.0.5/dist.min.js"></script>
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loader" style="display: none;">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
  <div id="map"></div>
  <button id="menu-toggle-btn" class="menu-toggle">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="control-panel open" id="control-panel">
    <h1>FIT Explorer 3D</h1>
    <div class="settings">
      <div class="setting-group">
        <label for="metric-select">高さ (Z軸)</label>
        <select id="metric-select">
          <option value="speed" selected>速度 (Speed)</option>
          <option value="power">パワー (Power)</option>
          <option value="power_3s">パワー3秒平均 (Power 3s Avg)</option>
          <option value="cadence">ケイデンス (Cadence)</option>
          <option value="heart_rate">心拍数 (Heart Rate)</option>
          <option value="altitude">標高 (Altitude)</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="color-select">色分け基準</label>
        <select id="color-select">
          <option value="speed" selected>速度 (Speed)</option>
          <option value="power">パワー (Power)</option>
          <option value="power_3s">パワー3秒平均 (Power 3s Avg)</option>
          <option value="cadence">ケイデンス (Cadence)</option>
          <option value="heart_rate">心拍数 (Heart Rate)</option>
          <option value="altitude">標高 (Altitude)</option>
        </select>
      </div>
      
      <div class="setting-group" id="ftp-group">
        <label for="ftp-input">FTP設定 (<span id="ftp-value">200</span>W)</label>
        <input type="range" id="ftp-input" min="50" max="500" step="1" value="200">
      </div>
      
      <div class="setting-group">
        <label for="height-scale">高さの倍率 (<span id="scale-value">1.0</span>x)</label>
        <input type="range" id="height-scale" min="0.1" max="10.0" step="0.1" value="1.0">
      </div>

      <div class="setting-group" style="margin-top: 12px; border-top: 1px solid var(--panel-border); padding-top: 16px;">
        <label>カメラ再生 (Bird's-eye)</label>
        <div style="display: flex; gap: 8px;">
          <button id="play-btn" class="ctrl-btn play-btn">再生</button>
          <button id="pause-btn" class="ctrl-btn pause-btn">一時停止</button>
          <button id="stop-btn" class="ctrl-btn stop-btn">停止</button>
        </div>
      </div>
      <div class="setting-group">
        <label for="speed-input">再生速度 (<span id="speed-value">10</span>x)</label>
        <input type="range" id="speed-input" min="1" max="250" step="1" value="10">
      </div>
    </div>
    
    <div class="drop-zone" id="drop-zone">
      <p>FITファイルをドロップ<br>またはタップして選択</p>
      <input type="file" id="file-input" accept=".fit" style="display:none" />
    </div>
    
    <div class="setting-group" style="margin-top: 12px; padding-top: 8px; margin-bottom: 12px;">
      <label>表示範囲 (Data Range)</label>
      <div style="display: flex; gap: 8px; align-items: center;">
        <span style="font-size: 0.8rem; color: var(--text-secondary);">Start</span>
        <input type="range" id="range-start" min="0" max="100" step="0.1" value="0">
        <span id="range-start-val" style="font-size: 0.8rem; color: var(--text-secondary); width: 40px; text-align: right;">0.0%</span>
      </div>
      <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px;">
        <span style="font-size: 0.8rem; color: var(--text-secondary);">End</span>
        <input type="range" id="range-end" min="0" max="100" step="0.1" value="100">
        <span id="range-end-val" style="font-size: 0.8rem; color: var(--text-secondary); width: 40px; text-align: right;">100.0%</span>
      </div>
    </div>

    <div class="setting-group" style="margin-bottom: 12px;">
      <label for="hud-position-select">HUD表示位置</label>
      <select id="hud-position-select">
        <option value="top-right" selected>右上 (Top Right)</option>
        <option value="bottom">下部 (Bottom)</option>
        <option value="hidden">非表示 (Hidden)</option>
      </select>
    </div>

    <div class="info-panel" id="info-panel" style="display: none;">
      <h3 id="info-title">Activity</h3>
      <p id="info-stats"></p>
    </div>
  </div>

  <div class="hud-panel top-right" id="hud-panel" style="display: none;">
    <div class="hud-header">
      <div style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.05em; margin-right: 8px;">LIVE</div>
      <button id="hud-play-toggle-btn" class="play-pause-btn">
        <svg id="hud-play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="hud-pause-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
    </div>
    <div class="hud-stats" id="hud-stats">
      <!-- リアルタイムデータが入ります -->
    </div>
  </div>
  
  <!-- ESM entry -->
  <script type="module" src="app.js"></script>
</body>
</html>
